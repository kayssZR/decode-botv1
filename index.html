 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DECODE</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  margin-top: 50px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

#paywall {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
}

.paywall-box {
  margin-top:100px;
}

#settings {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>DECODE 🧠</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Entre ton email">
  <button onclick="login()">Se connecter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <p id="welcome"></p>

  <input id="question" placeholder="Pose ta question">
  <button onclick="ask()">Demander</button>

  <p id="response"></p>

  <br>

  <button onclick="openPaywall()">⭐ Premium</button>
  <button onclick="openSettings()">⚙️ Paramètres</button>
</div>

</div>

<!-- PAYWALL -->
<div id="paywall">
  <div class="paywall-box">
    <h2>Passer en Premium</h2>

    <button onclick="studentFlow()">Étudiant - 3,99€</button>
    <button onclick="standardFlow()">Standard - 5,99€</button>

    <div id="studentBox" style="display:none;">
      <p>Tarif étudiant 💙 (on pense à vous)</p>
      <input id="studentEmail" placeholder="Email étudiant">
      <button onclick="verifyStudent()">Valider</button>
    </div>

    <p id="payMsg"></p>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings">
  <h2>Paramètres</h2>

  <input id="friendEmail" placeholder="Ajouter un ami">
  <button onclick="addFriend()">Ajouter</button>

  <br><br>

  <button onclick="createSession()">Créer session (max 4 premium)</button>

  <p id="sessionMsg"></p>

  <button onclick="closeSettings()">Fermer</button>
</div>

<script>
let user = {
  email: null,
  isPremium: false,
  usage: 0,
  friends: []
};

// LOGIN
function login() {
  const email = document.getElementById("email").value;

  if(!email.includes("@")) {
    alert("Email invalide");
    return;
  }

  user.email = email;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  showWelcome();
}

// MESSAGE
function showWelcome() {
  const msgs = [
    "Tu m'as manqué 🔥",
    "Tes révisions vont payer 💪",
    "Continue comme ça 👏",
    "Tu vas devenir une machine 🧠"
  ];

  document.getElementById("welcome").innerText =
    msgs[Math.floor(Math.random()*msgs.length)];
}

// IA
async function ask() {

  if(!canUse()) return;

  const question = document.getElementById("question").value;

  document.getElementById("response").innerText = "⏳ Réflexion...";

  try {
    const res = await fetch("http://localhost:3000/api/ask", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question})
    });

    const data = await res.json();

    document.getElementById("response").innerText = data.answer;

  } catch {
    document.getElementById("response").innerText = "❌ Erreur serveur";
  }
}

// LIMITATION GRATUIT
function canUse() {
  if(!user.isPremium && user.usage >= 3) {
    openPaywall();
    return false;
  }
  user.usage++;
  return true;
}

// PAYWALL
function openPaywall() {
  document.getElementById("paywall").style.display="block";
}

function studentFlow() {
  document.getElementById("studentBox").style.display="block";
}

function verifyStudent() {
  const email = document.getElementById("studentEmail").value;

  if(email.includes("univ") || email.endsWith(".edu")) {
    activatePremium("Étudiant");
  } else {
    document.getElementById("payMsg").innerText =
      "Non reconnu étudiant → offre standard";
    setTimeout(standardFlow,1500);
  }
}

function standardFlow() {
  activatePremium("Standard");
}

function activatePremium(type) {
  user.isPremium = true;

  document.getElementById("payMsg").innerText =
    "🎉 Premium activé ("+type+")";

  document.getElementById("paywall").style.display="none";
}

// SETTINGS
function openSettings() {
  document.getElementById("settings").style.display="block";
}

function closeSettings() {
  document.getElementById("settings").style.display="none";
}

// AMIS
function addFriend() {
  const email = document.getElementById("friendEmail").value;

  if(!email.includes("@")) return alert("Email invalide");

  user.friends.push(email);

  alert("Ami ajouté");
}

// SESSION
function createSession() {

  if(!user.isPremium) {
    alert("Premium requis");
    return;
  }

  if(user.friends.length === 0) {
    alert("Ajoute au moins 1 ami");
    return;
  }

  if(user.friends.length > 3) {
    alert("Max 4 personnes");
    return;
  }

  document.getElementById("sessionMsg").innerText =
    "Session créée 🔥 (simulation)";
}
</script>

</body>
</html>
