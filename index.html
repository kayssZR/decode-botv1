<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DECODE v12 | Social & Masterclass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        /* [Tes variables CSS d'origine conservées] */
        :root{
            --bg:#0a0b0f; --bg2:#111218; --bg3:#1a1b24; --card:#161720;
            --border:#2a2b3d; --ink:#f0f0ff; --p:#7c6af5; --g:#10d9a0;
            --r:#f5416a; --s-sidebar:240px; --r-lg:16px;
        }

        /* RESET & BASE */
        *{box-sizing:border-box; margin:0; padding:0;}
        body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; overflow-x:hidden;}

        /* SIDEBAR (Version v12) */
        .sidebar {
            width: var(--s-sidebar); background: var(--bg2); border-right: 1px solid var(--border);
            position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100;
        }
        .sb-top { padding: 20px; border-bottom: 1px solid var(--border); }
        .sb-logo { display: flex; align-items: center; gap: 10px; font-family: 'Syne'; font-size: 20px; font-weight: 800; }
        .sb-logo em { color: var(--p); font-style: normal; }
        
        .sb-nav { flex: 1; padding: 12px; }
        .sb-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px;
            color: #8889a8; cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        .sb-item:hover, .sb-item.active { background: var(--bg3); color: var(--ink); }
        .sb-item.active { border: 1px solid rgba(124,106,245,0.3); color: var(--p); }

        /* MAIN CONTENT */
        .main-content { margin-left: var(--s-sidebar); min-height: 100vh; display: flex; flex-direction: column; }
        .panel { display: none; padding: 40px; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }

        /* BIBLIOTHÈQUE - DESIGN 'NETFLIX' */
        .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 24px; }
        .lib-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); 
            padding: 24px; position: relative; overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .lib-card:hover { transform: translateY(-5px); border-color: var(--p); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lib-card::after { content: 'PDF'; position: absolute; top: 10px; right: 10px; font-size: 10px; font-family: 'JetBrains Mono'; color: var(--p); opacity: 0.5; }
        .lib-title { font-family: 'Syne'; font-weight: 700; font-size: 18px; margin-bottom: 8px; }
        .lib-author { font-size: 11px; color: #555670; font-family: 'JetBrains Mono'; }

        /* SOCIAL - SYSTEM */
        .social-container { max-width: 800px; }
        .friend-row { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--bg3); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .friend-info { display: flex; align-items: center; gap: 15px; }
        .friend-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--p), var(--g)); }

        /* UI ELEMENTS */
        .btn-gen { 
            background: linear-gradient(135deg, var(--p), #9d5cf5); color: #fff; border: none; 
            padding: 14px 28px; border-radius: 12px; font-family: 'Syne'; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(124,106,245,0.3); transition: 0.2s;
        }
        .btn-gen:hover { transform: scale(1.02); }

        @keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sb-top">
            <div class="sb-logo">DECODE<em>.ai</em></div>
        </div>
        <div class="sb-nav">
            <div class="sb-item active" onclick="showPanel('dash')"><span>🏠</span> Dashboard</div>
            <div class="sb-item" onclick="showPanel('lib')"><span>📚</span> Bibliothèque</div>
            <div class="sb-item" onclick="showPanel('social')"><span>👥</span> Amis</div>
            <div style="margin-top:20px; font-size:10px; color:var(--p); font-family:'JetBrains Mono';">PREMIUM ACCESS</div>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="panel-dash" class="panel active">
            <h1 style="font-family:'Syne'; font-size:32px; margin-bottom:10px;">Salut, Éclaireur ! 👋</h1>
            <p style="color:#8889a8; margin-bottom:30px;">Prêt à décoder une nouvelle matière aujourd'hui ?</p>
            
            <div style="background:var(--card); padding:40px; border-radius:24px; border:1px solid var(--border); text-align:center;">
                <h2 style="font-family:'Syne'; margin-bottom:20px;">Générateur de Masterclass PDF</h2>
                <input type="text" id="subjectInput" placeholder="ex: Droit des Affaires L3..." 
                       style="width:100%; max-width:400px; padding:15px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:20px; outline:none;">
                <br>
                <button class="btn-gen" onclick="triggerGeneration()">Générer le cours complet</button>
            </div>
        </section>

        <section id="panel-lib" class="panel">
            <h1 style="font-family:'Syne'; font-size:28px;">Bibliothèque Commune</h1>
            <div class="lib-grid" id="libContainer">
                <div class="lib-card">
                    <div class="lib-title">Droit Fiscal L2</div>
                    <div class="lib-author">Généré par @AlexDev</div>
                </div>
            </div>
        </section>

        <section id="panel-social" class="panel">
            <h1 style="font-family:'Syne'; font-size:28px; margin-bottom:20px;">Tes Amis</h1>
            <div class="social-container">
                <div class="friend-row">
                    <div class="friend-info">
                        <div class="friend-avatar"></div>
                        <div>
                            <div style="font-weight:600;">Thomas L.</div>
                            <div style="font-size:11px; color:var(--p);">L2 Économie</div>
                        </div>
                    </div>
                    <button style="background:none; border:1px solid var(--border); color:#fff; padding:8px 15px; border-radius:8px; cursor:pointer;">Message</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_URL = "http://localhost:3000"; // À remplacer par ton futur lien Railway

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + id).classList.add('active');
            
            document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
            // Logique simple pour l'état active
        }

        async function triggerGeneration() {
            const subject = document.getElementById('subjectInput').value;
            if(!subject) return alert("Indique une matière !");

            alert("Génération lancée ! Vérifie l'onglet Bibliothèque dans 1 minute.");
            
            const res = await fetch(`${API_URL}/api/generate-masterclass`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ subject: subject, userId: '123', level: 'L2' })
            });
            const data = await res.json();
            if(data.pdfUrl) window.open(data.pdfUrl);
        }

        // Simu chargement bibliothèque
        async function loadLib() {
            // Ici tu feras un fetch vers ton API /api/library
        }
    </script>
</body>
</html>
